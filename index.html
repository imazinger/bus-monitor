<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>バス接近情報</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }

    main {
      display: grid;
      gap: 12px;
      min-height: 100vh;
      padding: 12px;
    }

    section {
      display: flex;
      min-height: 70vh;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #fff;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #d8dee8;
    }

    h1 {
      margin: 0;
      min-width: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    a {
      flex: 0 0 auto;
      color: #0f5fb8;
      font-size: 14px;
      text-decoration: none;
      white-space: nowrap;
    }

    a:hover {
      text-decoration: underline;
    }

    iframe {
      width: 100%;
      min-height: 560px;
      flex: 1;
      border: 0;
      background: #fff;
    }

    @media (min-width: 800px) {
      main {
        grid-template-columns: 1fr 1fr;
      }

      section {
        min-height: calc(100vh - 24px);
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <header>
        <h1>中村町下 → 静岡駅前</h1>
        <a href="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250030" target="_blank" rel="noopener noreferrer">新しいタブで開く</a>
      </header>
      <iframe
        title="中村町下から静岡駅前のバス接近情報"
        src="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250030">
      </iframe>
    </section>

    <section>
      <header>
        <h1>静岡駅前 → 静岡総合庁舎前</h1>
        <a href="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250460" target="_blank" rel="noopener noreferrer">新しいタブで開く</a>
      </header>
      <iframe
        title="静岡駅前から静岡総合庁舎前のバス接近情報"
        src="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250460">
      </iframe>
    </section>
  </main>
</body>
</html>
