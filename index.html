<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🚌 静鉄バス接近</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }

    main {
      display: flex;
      height: 100vh;
      height: 100dvh;
      flex-direction: column;
      padding: 12px;
    }

    .panel {
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #fff;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #d8dee8;
    }

    h1 {
      margin: 0;
      min-width: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .controls {
      max-height: 280px;
      overflow: hidden;
      transition: max-height 180ms ease, opacity 180ms ease;
    }

    body.controls-hidden .controls {
      max-height: 0;
      opacity: 0;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      overflow-x: visible;
      padding: 8px;
      border-bottom: 1px solid #d8dee8;
    }

    .tab {
      flex: 1 1 calc(50% - 6px);
      min-height: 44px;
      padding: 0 8px;
      border: 1px solid #c9d2df;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .tab[aria-selected="true"] {
      border-color: #0f5fb8;
      background: #0f5fb8;
      color: #fff;
    }

    .reload-button {
      display: inline-flex;
      min-height: 40px;
      gap: 6px;
      align-items: center;
      padding: 0 12px;
      border: 1px solid #c9d2df;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
    }

    .reload-icon {
      font-size: 18px;
      line-height: 1;
    }

    iframe {
      width: 100%;
      min-height: 0;
      flex: 1;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="controls">
        <header>
          <h1>🚌 静鉄バス接近情報</h1>
          <button class="reload-button" id="reloadButton" type="button" aria-label="現在の接近情報をリロード">
            <span class="reload-icon" aria-hidden="true">↻</span>
            <span>リロード</span>
          </button>
        </header>

        <nav class="tabs" aria-label="区間">
          <button class="tab" type="button" aria-selected="true" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250030">行き 中村町下</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250460">行き 静岡駅前</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250460&amp;&amp;goalId=00250030">帰り 総合庁舎</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250422">帰り 静岡駅→中村町下</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250320">帰り 静岡駅→静岡IC</button>
        </nav>
      </div>

      <iframe
        id="busFrame"
        title="行き 中村町下のバス接近情報">
      </iframe>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const busFrame = document.getElementById("busFrame");
    const reloadButton = document.getElementById("reloadButton");
    let lastScrollY = window.scrollY;
    let touchStartY = 0;

    function setControlsHidden(hidden) {
      document.body.classList.toggle("controls-hidden", hidden);
    }

    function selectTab(tab) {
      tabs.forEach((item) => item.setAttribute("aria-selected", "false"));
      tab.setAttribute("aria-selected", "true");
      busFrame.src = tab.dataset.url;
      busFrame.title = `${tab.textContent}のバス接近情報`;
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        if (tab.getAttribute("aria-selected") === "true") {
          return;
        }

        selectTab(tab);
      });
    });

    selectTab(tabs[new Date().getHours() < 12 ? 0 : 2]);

    reloadButton.addEventListener("click", () => {
      busFrame.src = busFrame.src;
    });

    window.addEventListener("wheel", (event) => {
      if (Math.abs(event.deltaY) < 8) {
        return;
      }

      setControlsHidden(event.deltaY > 0);
    }, { passive: true });

    window.addEventListener("touchstart", (event) => {
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    window.addEventListener("touchmove", (event) => {
      const deltaY = touchStartY - event.touches[0].clientY;

      if (Math.abs(deltaY) < 12) {
        return;
      }

      setControlsHidden(deltaY > 0);
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    window.addEventListener("scroll", () => {
      const currentScrollY = window.scrollY;

      if (Math.abs(currentScrollY - lastScrollY) > 4) {
        setControlsHidden(currentScrollY > lastScrollY);
        lastScrollY = currentScrollY;
      }
    }, { passive: true });
  </script>
</body>
</html>
