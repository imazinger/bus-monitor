<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>バス接近情報</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }

    main {
      display: flex;
      height: 100vh;
      height: 100dvh;
      flex-direction: column;
      padding: 12px;
    }

    .panel {
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #fff;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #d8dee8;
    }

    h1 {
      margin: 0;
      min-width: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 12px;
      border-bottom: 1px solid #d8dee8;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid #c9d2df;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tab[aria-selected="true"] {
      border-color: #0f5fb8;
      background: #0f5fb8;
      color: #fff;
    }

    a {
      flex: 0 0 auto;
      color: #0f5fb8;
      font-size: 14px;
      text-decoration: none;
      white-space: nowrap;
    }

    a:hover {
      text-decoration: underline;
    }

    iframe {
      width: 100%;
      min-height: 0;
      flex: 1;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <header>
        <h1>バス接近情報</h1>
        <a id="openLink" href="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250030" target="_blank" rel="noopener noreferrer">別タブで開く</a>
      </header>

      <nav class="tabs" aria-label="区間">
        <button class="tab" type="button" aria-selected="true" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250030">行き 中村町下発</button>
        <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250460">行き 静岡駅前発</button>
        <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250460&amp;&amp;goalId=00250030">帰り 静岡総合庁舎発</button>
        <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250422">帰り 静岡駅→中村町下</button>
        <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250320">帰り 静岡駅→静岡IC入口</button>
      </nav>

      <iframe
        id="busFrame"
        title="行き 中村町下発のバス接近情報"
        src="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250030">
      </iframe>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const busFrame = document.getElementById("busFrame");
    const openLink = document.getElementById("openLink");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        if (tab.getAttribute("aria-selected") === "true") {
          return;
        }

        tabs.forEach((item) => item.setAttribute("aria-selected", "false"));
        tab.setAttribute("aria-selected", "true");
        busFrame.src = tab.dataset.url;
        busFrame.title = `${tab.textContent}のバス接近情報`;
        openLink.href = tab.dataset.url;
      });
    });
  </script>
</body>
</html>
