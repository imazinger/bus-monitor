<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🚌 静鉄バス接近</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }

    main {
      display: flex;
      height: 100vh;
      height: 100dvh;
      flex-direction: column;
      padding: 8px;
    }

    .panel {
      display: flex;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #fff;
    }

    header {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      border-bottom: 1px solid #d8dee8;
    }

    h1 {
      flex: 1;
      margin: 0;
      min-width: 0;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      white-space: nowrap;
    }

    .controls-toggle {
      flex: none;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid #c9d2df;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 280px;
      overflow-x: visible;
      padding: 8px;
      border-bottom: 1px solid #d8dee8;
      transition: max-height 180ms ease, opacity 180ms ease, padding 180ms ease;
    }

    body.tabs-hidden .tabs {
      max-height: 0;
      overflow: hidden;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
    }

    .tab-divider {
      flex: 0 0 100%;
      height: 1px;
      margin: 2px 0;
      background: #d8dee8;
    }

    .tab {
      flex: 1 1 calc(50% - 6px);
      min-height: 44px;
      padding: 0 8px;
      border: 1px solid #c9d2df;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .tab[aria-selected="true"] {
      border-color: #0f5fb8;
      background: #0f5fb8;
      color: #fff;
    }

    .reload-button {
      display: inline-flex;
      flex: none;
      width: 34px;
      min-height: 32px;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid #c9d2df;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
    }

    .reload-icon {
      font-size: 18px;
      line-height: 1;
    }

    iframe {
      width: 100%;
      min-height: 0;
      flex: 1;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="controls">
        <header>
          <h1>🚌 静鉄バス接近情報</h1>
          <button class="controls-toggle" id="controlsToggle" type="button" aria-expanded="true">タブを閉じる</button>
          <button class="reload-button" id="reloadButton" type="button" aria-label="現在の接近情報をリロード">
            <span class="reload-icon" aria-hidden="true">↻</span>
          </button>
        </header>

        <nav class="tabs" aria-label="区間">
          <button class="tab" type="button" aria-selected="true" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250030">行き 中村町下</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250460">行き 静岡駅前</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250460&amp;&amp;goalId=00250030">帰り 総合庁舎</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250422">帰り 静岡駅→中村町下</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250030&amp;&amp;goalId=00250320">帰り 静岡駅→静岡IC</button>
          <div class="tab-divider" aria-hidden="true"></div>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250422&amp;&amp;goalId=00250032">休日 行き 中村町下</button>
          <button class="tab" type="button" aria-selected="false" data-url="https://transfer.navitime.biz/justline/smart/location/BusLocationResult?startId=00250032&amp;&amp;goalId=00250422">休日 帰り 中町</button>
        </nav>
      </div>

      <iframe
        id="busFrame"
        title="行き 中村町下のバス接近情報">
      </iframe>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const busFrame = document.getElementById("busFrame");
    const controlsToggle = document.getElementById("controlsToggle");
    const reloadButton = document.getElementById("reloadButton");

    function setTabsHidden(hidden) {
      document.body.classList.toggle("tabs-hidden", hidden);
      controlsToggle.textContent = hidden ? "タブを開く" : "タブを閉じる";
      controlsToggle.setAttribute("aria-expanded", String(!hidden));
    }

    function selectTab(tab) {
      tabs.forEach((item) => item.setAttribute("aria-selected", "false"));
      tab.setAttribute("aria-selected", "true");
      busFrame.src = tab.dataset.url;
      busFrame.title = `${tab.textContent}のバス接近情報`;
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        if (tab.getAttribute("aria-selected") === "true") {
          return;
        }

        selectTab(tab);
      });
    });

    const now = new Date();
    const initialTabIndex = now.getDay() === 0 || now.getDay() === 6
      ? now.getHours() < 18 ? 5 : 6
      : now.getHours() < 12 ? 0 : 2;
    selectTab(tabs[initialTabIndex]);

    reloadButton.addEventListener("click", () => {
      busFrame.src = busFrame.src;
    });

    controlsToggle.addEventListener("click", () => {
      setTabsHidden(!document.body.classList.contains("tabs-hidden"));
    });
  </script>
</body>
</html>
